# ============================================================
# RAG Agent Backend — Application Properties
# ============================================================

# --- Server ---
server.port=8080

# --- ChromaDB Configuration ---
# --- Python Sidecar (Two-Stage RAG) Configuration ---
# URL of the Python FastAPI sidecar (NOT ChromaDB directly)
chromadb.url=http://localhost:8002/search
# Name of the ChromaDB collection to query
chromadb.collection=turath_chroma_data
# Number of top document chunks to retrieve
chromadb.top-k=3

# --- Local LLM Configuration ---
# URL of the Apple MLX server running the fine-tuned LLaMA 3.1 model
llm.url=http://localhost:8081/v1/chat/completions
llm.model=models/Turath_V1_Final
# Max tokens for the LLM response
llm.max-tokens=1024
# Temperature for generation (lower = more deterministic)
llm.temperature=0.1

# --- Logging ---
logging.level.com.ragagent=DEBUG
